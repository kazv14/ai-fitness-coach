<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AI FITNESS COACH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --accent: #00ff88;
    --warn: #ff3c5a;
    --muted: #2a2a3a;
    --text: #e8e8f0;
    --dim: #6a6a8a;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: calc(var(--safe-top) + 10px) 18px 10px;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--muted);
    display: flex; align-items: center; justify-content: space-between;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 16px rgba(0,255,136,0.5);
  }
  .logo span { color: var(--text); }

  .status-badge {
    display: flex; align-items: center; gap: 7px;
    font-size: 0.6rem; letter-spacing: 2px; color: var(--dim);
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--warn); transition: background 0.3s;
  }
  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* ── MAIN LAYOUT (vertical scroll) ── */
  main {
    position: fixed; inset: 0;
    padding-top: calc(var(--safe-top) + 54px);
    padding-bottom: calc(var(--safe-bottom) + 8px);
    overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    z-index: 1;
  }

  .inner { padding: 10px 14px; display: flex; flex-direction: column; gap: 10px; }

  /* ── CAMERA BOX ── */
  .camera-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 9/13;
    background: var(--panel);
    border: 1px solid var(--muted);
    border-radius: 14px;
    overflow: hidden;
  }

  #videoEl {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0; pointer-events: none;
  }

  #poseCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  /* Angle chips */
  .angle-display {
    position: absolute; top: 10px; left: 10px;
    display: flex; gap: 6px; z-index: 10;
  }
  .angle-chip {
    background: rgba(10,10,15,0.8);
    border: 1px solid var(--muted);
    border-radius: 6px; padding: 5px 10px;
    font-size: 0.65rem; letter-spacing: 1px;
    backdrop-filter: blur(8px);
    transition: border-color 0.3s, color 0.3s;
  }
  .angle-chip.good { border-color: var(--accent); color: var(--accent); }
  .angle-chip.warn { border-color: var(--warn); color: var(--warn); }

  /* Feedback banner */
  .feedback-banner {
    position: absolute; bottom: 14px; left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: rgba(255,60,90,0.15);
    border: 1px solid var(--warn);
    border-radius: 8px; padding: 9px 24px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem; letter-spacing: 3px;
    color: var(--warn); white-space: nowrap;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    backdrop-filter: blur(8px); z-index: 10;
  }
  .feedback-banner.show { transform: translateX(-50%) translateY(0); }
  .feedback-banner.good-fb { background: rgba(0,255,136,0.1); border-color: var(--accent); color: var(--accent); }

  /* Start overlay */
  .start-overlay {
    position: absolute; inset: 0; z-index: 20;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
    background: rgba(10,10,15,0.88); backdrop-filter: blur(4px);
    transition: opacity 0.4s;
  }
  .start-overlay.hidden { opacity: 0; pointer-events: none; }

  .start-icon { font-size: 3.5rem; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  .start-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; letter-spacing: 4px;
  }
  .start-desc {
    font-size: 0.7rem; color: var(--dim);
    letter-spacing: 1px; text-align: center; line-height: 1.9;
    padding: 0 20px;
  }
  .btn-start {
    background: var(--accent); color: var(--bg);
    border: none; padding: 14px 44px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.15rem; letter-spacing: 3px;
    cursor: pointer; border-radius: 8px;
    box-shadow: 0 0 24px rgba(0,255,136,0.35);
    transition: transform 0.15s;
  }
  .btn-start:active { transform: scale(0.96); }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--muted);
    border-radius: 12px; padding: 14px 16px;
    position: relative; overflow: hidden;
  }
  .card::after {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: var(--accent); opacity: 0.4;
  }
  .card-label {
    font-size: 0.58rem; letter-spacing: 3px;
    color: var(--dim); margin-bottom: 6px;
  }
  .card-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.2rem; line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 24px rgba(0,255,136,0.35);
  }
  .card-value.flash { animation: countFlash 0.35s ease; }
  @keyframes countFlash {
    0%{transform:scale(1)} 45%{transform:scale(1.2);color:#fff} 100%{transform:scale(1)}
  }
  .card-sub { font-size: 0.6rem; color: var(--dim); margin-top: 4px; }

  /* ── PHASE CARD ── */
  .phase-card {
    background: var(--panel);
    border: 1px solid var(--muted);
    border-radius: 12px; padding: 14px 16px;
  }
  .phase-label { font-size: 0.58rem; letter-spacing: 3px; color: var(--dim); margin-bottom: 10px; }
  .phase-steps { display: flex; justify-content: space-between; }
  .phase-step {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    font-size: 0.52rem; letter-spacing: 1px; color: var(--muted);
    transition: color 0.3s; flex: 1;
  }
  .phase-step.active { color: var(--accent); }
  .phase-dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1.5px solid currentColor;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .phase-step.active .phase-dot {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  /* connecting line */
  .phase-line {
    flex: 1; height: 1px;
    background: var(--muted); margin-top: -17px; margin-bottom: auto;
    align-self: flex-start; margin-left: -4px; margin-right: -4px;
    position: relative; top: 5px;
  }

  /* ── ARC GAUGES ── */
  .arc-card {
    background: var(--panel);
    border: 1px solid var(--muted);
    border-radius: 12px; padding: 14px 16px;
  }
  .arc-label { font-size: 0.58rem; letter-spacing: 3px; color: var(--dim); margin-bottom: 10px; }
  .arc-row { display: flex; justify-content: space-around; }
  .arc-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .arc-name { font-size: 0.58rem; letter-spacing: 2px; color: var(--dim); }
  .arc-deg { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; }

  /* ── HISTORY ── */
  .history-card {
    background: var(--panel);
    border: 1px solid var(--muted);
    border-radius: 12px; padding: 14px 16px;
    margin-bottom: 6px;
  }
  .history-label { font-size: 0.58rem; letter-spacing: 3px; color: var(--dim); margin-bottom: 10px; }
  .history-dots { display: flex; flex-wrap: wrap; gap: 5px; }
  .history-dot {
    width: 13px; height: 13px; border-radius: 3px;
    background: var(--muted);
  }
  .history-dot.good-rep { background: var(--accent); box-shadow: 0 0 5px rgba(0,255,136,0.4); }
  .history-dot.warn-rep { background: #ffaa00; }

  /* ── LOADING ── */
  #loadingMsg {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    background: var(--bg);
    font-size: 0.75rem; letter-spacing: 2px; color: var(--dim);
  }
  .loader-bar { width: 180px; height: 2px; background: var(--muted); border-radius: 2px; overflow: hidden; }
  .loader-fill {
    height: 100%; background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: load 2.2s ease-in-out forwards;
  }
  @keyframes load { 0%{width:0%} 70%{width:80%} 100%{width:100%} }
</style>
</head>
<body>

<!-- Loading -->
<div id="loadingMsg">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--accent);letter-spacing:6px;">AI FITNESS COACH</div>
  <div>LOADING MODEL...</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<!-- Header -->
<header>
  <div class="logo">AI <span>FITNESS</span> COACH</div>
  <div class="status-badge">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">OFFLINE</span>
  </div>
</header>

<!-- Scrollable body -->
<main>
  <div class="inner">

    <!-- Camera -->
    <div class="camera-wrap">
      <video id="videoEl" playsinline muted autoplay></video>
      <canvas id="poseCanvas"></canvas>

      <div class="angle-display">
        <div class="angle-chip" id="leftAngleChip">L: --°</div>
        <div class="angle-chip" id="rightAngleChip">R: --°</div>
      </div>

      <div class="feedback-banner" id="feedbackBanner">もっと深く！</div>

      <div class="start-overlay" id="startOverlay">
        <div class="start-icon">🏋️</div>
        <div class="start-title">SQUAT ANALYZER</div>
        <div class="start-desc">
          全身が映るように少し離れて立ってください<br>
          横向きに置くとより精度が上がります
        </div>
        <button class="btn-start" id="btnStart">カメラを起動</button>
      </div>
    </div>

    <!-- Rep count + Phase -->
    <div class="stats-row">
      <div class="card">
        <div class="card-label">REP COUNT</div>
        <div class="card-value" id="repCount">0</div>
        <div class="card-sub" id="repQuality">待機中</div>
      </div>
      <div class="card">
        <div class="card-label">BEST DEPTH</div>
        <div class="card-value" id="bestDepth">--</div>
        <div class="card-sub">degrees</div>
      </div>
    </div>

    <!-- Phase -->
    <div class="phase-card">
      <div class="phase-label">SQUAT PHASE</div>
      <div class="phase-steps">
        <div class="phase-step active" id="phaseStand">
          <div class="phase-dot"></div>
          <span>STAND</span>
        </div>
        <div class="phase-line"></div>
        <div class="phase-step" id="phaseDown">
          <div class="phase-dot"></div>
          <span>DOWN</span>
        </div>
        <div class="phase-line"></div>
        <div class="phase-step" id="phaseBottom">
          <div class="phase-dot"></div>
          <span>BOTTOM</span>
        </div>
        <div class="phase-line"></div>
        <div class="phase-step" id="phaseUp">
          <div class="phase-dot"></div>
          <span>UP</span>
        </div>
      </div>
    </div>

    <!-- Knee angles -->
    <div class="arc-card">
      <div class="arc-label">KNEE ANGLE</div>
      <div class="arc-row">
        <div class="arc-item">
          <canvas id="arcLeft" width="110" height="65"></canvas>
          <div class="arc-name">LEFT</div>
          <div class="arc-deg" id="arcLeftDeg" style="color:var(--dim)">--°</div>
        </div>
        <div class="arc-item">
          <canvas id="arcRight" width="110" height="65"></canvas>
          <div class="arc-name">RIGHT</div>
          <div class="arc-deg" id="arcRightDeg" style="color:var(--dim)">--°</div>
        </div>
      </div>
    </div>

    <!-- History -->
    <div class="history-card">
      <div class="history-label">REP HISTORY</div>
      <div class="history-dots" id="historyDots">
        <div style="font-size:0.65rem;color:var(--muted)">スクワット待ち...</div>
      </div>
    </div>

  </div>
</main>

<script type="module">
  import { PoseLandmarker, FilesetResolver, DrawingUtils }
    from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/vision_bundle.mjs";

  // ── State ──
  let poseLandmarker, webcamRunning = false, lastVideoTime = -1;
  let repCount = 0, phase = 'stand', bottomAngle = 180;
  let feedbackTimer = null, speakCooldown = false;
  const SQUAT_TH = 105, DEEP_TH = 85, STAND_TH = 160;

  const videoEl = document.getElementById('videoEl');
  const canvas  = document.getElementById('poseCanvas');
  const ctx     = canvas.getContext('2d');

  // ── Init ──
  async function init() {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm"
    );
    poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numPoses: 1
    });
    document.getElementById('loadingMsg').style.display = 'none';
  }

  // ── Camera ──
  document.getElementById('btnStart').addEventListener('click', async () => {
    try {
      // iPhone: environment = 背面カメラ（後ろから自分を撮る場合）、user = 前面
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 720 }, height: { ideal: 1280 } }
      });
      videoEl.srcObject = stream;
      videoEl.addEventListener('loadeddata', () => {
        webcamRunning = true;
        document.getElementById('startOverlay').classList.add('hidden');
        document.getElementById('statusDot').classList.add('active');
        document.getElementById('statusText').textContent = 'DETECTING';
        loop();
      });
    } catch(e) {
      alert('カメラ許可が必要です。\nSafari設定 → カメラ → 許可\n\n' + e.message);
    }
  });

  // ── Loop ──
  function loop() {
    if (!webcamRunning) return;
    if (videoEl.currentTime !== lastVideoTime) {
      lastVideoTime = videoEl.currentTime;
      canvas.width  = videoEl.videoWidth  || 720;
      canvas.height = videoEl.videoHeight || 1280;
      draw(poseLandmarker.detectForVideo(videoEl, performance.now()));
    }
    requestAnimationFrame(loop);
  }

  // ── Draw ──
  function draw(results) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save(); ctx.scale(-1,1);
    ctx.drawImage(videoEl, -canvas.width, 0, canvas.width, canvas.height);
    ctx.restore();

    if (!results.landmarks?.length) return;
    const lm = results.landmarks[0];
    const du = new DrawingUtils(ctx);

    ctx.save(); ctx.scale(-1,1); ctx.translate(-canvas.width,0);
    du.drawConnectors(lm, PoseLandmarker.POSE_CONNECTIONS, { color:'rgba(0,255,136,0.3)', lineWidth:2 });
    du.drawLandmarks(lm, { color:'rgba(0,255,136,0.75)', lineWidth:1, radius:4 });
    ctx.restore();

    const lA = angle(lm[23], lm[25], lm[27]);
    const rA = angle(lm[24], lm[26], lm[28]);
    const avg = (lA + rA) / 2;

    updateAngleUI(lA, rA);
    drawArc('arcLeft',  lA);
    drawArc('arcRight', rA);
    highlightKnee(lm[25], lA);
    highlightKnee(lm[26], rA);
    fsm(avg);
  }

  // ── Angle calc ──
  function angle(a, b, c) {
    if (!a||!b||!c) return 180;
    let r = Math.atan2(c.y-b.y, c.x-b.x) - Math.atan2(a.y-b.y, a.x-b.x);
    let d = Math.abs(r * 180 / Math.PI);
    return Math.round(d > 180 ? 360-d : d);
  }

  // ── FSM ──
  function fsm(a) {
    const prev = phase;
    if (phase==='stand' && a < STAND_TH-20) { phase='down'; bottomAngle=a; }
    else if (phase==='down') {
      bottomAngle = Math.min(bottomAngle, a);
      if (a < SQUAT_TH) phase='bottom';
    } else if (phase==='bottom') {
      bottomAngle = Math.min(bottomAngle, a);
      if (a > SQUAT_TH+15) phase='up';
    } else if (phase==='up' && a > STAND_TH) {
      const isDeep = bottomAngle <= DEEP_TH;
      const isGood = bottomAngle <= SQUAT_TH;
      repCount++;
      updateRepUI(isDeep, isGood);
      feedback(isDeep, isGood);
      phase='stand'; bottomAngle=180;
    }
    if (phase!==prev) updatePhaseUI();
  }

  // ── UI ──
  function updateAngleUI(l, r) {
    const avg = (l+r)/2;
    const cls = avg<STAND_TH ? (avg<SQUAT_TH?' good':' warn') : '';
    document.getElementById('leftAngleChip').textContent  = `L: ${l}°`;
    document.getElementById('rightAngleChip').textContent = `R: ${r}°`;
    document.getElementById('leftAngleChip').className  = 'angle-chip'+cls;
    document.getElementById('rightAngleChip').className = 'angle-chip'+cls;
    const color = avg<=SQUAT_TH?'#00ff88':avg<STAND_TH?'#ffaa00':'#6a6a8a';
    document.getElementById('arcLeftDeg').textContent  = l+'°';
    document.getElementById('arcRightDeg').textContent = r+'°';
    document.getElementById('arcLeftDeg').style.color  = color;
    document.getElementById('arcRightDeg').style.color = color;
  }

  function updateRepUI(isDeep, isGood) {
    const el = document.getElementById('repCount');
    el.textContent = repCount;
    el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
    document.getElementById('repQuality').textContent =
      isDeep ? '✓ PERFECT' : isGood ? '✓ GOOD' : '⚠ DEEPER';
    document.getElementById('bestDepth').textContent = bottomAngle + '°';

    const dots = document.getElementById('historyDots');
    if (dots.querySelector('div[style]')) dots.innerHTML='';
    const d = document.createElement('div');
    d.className = 'history-dot ' + (isGood ? 'good-rep' : 'warn-rep');
    dots.appendChild(d);
    if (dots.children.length > 40) dots.removeChild(dots.firstChild);
  }

  function updatePhaseUI() {
    const map = { stand:'phaseStand', down:'phaseDown', bottom:'phaseBottom', up:'phaseUp' };
    Object.entries(map).forEach(([k,id]) => {
      document.getElementById(id).className = 'phase-step'+(k===phase?' active':'');
    });
  }

  function feedback(isDeep, isGood) {
    const b = document.getElementById('feedbackBanner');
    const msg = !isGood ? 'もっと深く！' : isDeep ? '完璧です！' : 'グッド！';
    b.textContent = msg;
    b.className = 'feedback-banner show' + (isGood?' good-fb':'');
    speak(msg);
    clearTimeout(feedbackTimer);
    feedbackTimer = setTimeout(()=>{ b.className='feedback-banner'; }, 2500);
  }

  function speak(text) {
    if (speakCooldown || !window.speechSynthesis) return;
    speakCooldown = true;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang='ja-JP'; u.rate=1.0; u.pitch=1.1; u.volume=1.0;
    u.onend = ()=>{ speakCooldown=false; };
    window.speechSynthesis.speak(u);
    setTimeout(()=>{ speakCooldown=false; }, 2200);
  }

  function drawArc(id, a) {
    const c = document.getElementById(id);
    const x = c.getContext('2d');
    const W=110, H=65, cx=55, cy=62, r=48;
    x.clearRect(0,0,W,H);
    x.beginPath(); x.arc(cx,cy,r,Math.PI,2*Math.PI);
    x.strokeStyle='#2a2a3a'; x.lineWidth=7; x.lineCap='round'; x.stroke();
    const frac = Math.max(0, Math.min(180,180-a))/180;
    const color = a<=SQUAT_TH?'#00ff88':a<STAND_TH?'#ffaa00':'#3a3a5a';
    x.beginPath(); x.arc(cx,cy,r,Math.PI,Math.PI+frac*Math.PI);
    x.strokeStyle=color; x.lineWidth=7; x.lineCap='round';
    if(a<=SQUAT_TH){x.shadowBlur=10;x.shadowColor=color;}
    x.stroke(); x.shadowBlur=0;
  }

  function highlightKnee(kp, a) {
    if (!kp) return;
    const x = (1-kp.x)*canvas.width, y = kp.y*canvas.height;
    ctx.beginPath(); ctx.arc(x,y,16,0,2*Math.PI);
    ctx.strokeStyle = a<=SQUAT_TH?'rgba(0,255,136,0.8)':'rgba(255,60,90,0.8)';
    ctx.lineWidth=2; ctx.stroke();
    if(a<=SQUAT_TH){ ctx.shadowBlur=14; ctx.shadowColor='#00ff88'; ctx.stroke(); ctx.shadowBlur=0; }
  }

  init();
  updatePhaseUI();
</script>
</body>
</html>
